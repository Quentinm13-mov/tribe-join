<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rejoindre le club — Tribe</title>
  <style>
    /* ─── Reset ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #F2F2F7;
      min-height: 100vh;
      color: #1C1C1E;
      -webkit-font-smoothing: antialiased;
    }
    .page { max-width: 480px; margin: 0 auto; padding: 32px 16px 80px; display: flex; flex-direction: column; gap: 12px; }
    .card { background: white; border-radius: 20px; padding: 28px 24px; }

    /* ─── Club header (form view) ───────────────────────────── */
    .club-head { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 10px; }
    .logo-img   { width: 72px; height: 72px; border-radius: 18px; object-fit: cover; }
    .logo-emoji { width: 72px; height: 72px; border-radius: 18px; background: #F2F2F7; font-size: 40px; display: flex; align-items: center; justify-content: center; }
    .club-name  { font-size: 22px; font-weight: 700; }
    .club-meta  { font-size: 14px; color: #8E8E93; }
    .club-desc  { font-size: 14px; color: #3C3C43; line-height: 1.5; }
    .mode-badge { font-size: 12px; padding: 4px 12px; border-radius: 20px; background: #F2F2F7; color: #636366; font-weight: 500; }

    /* ─── Form ──────────────────────────────────────────────── */
    .form-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: #8E8E93; margin-bottom: 20px; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 13px; font-weight: 600; color: #3C3C43; margin-bottom: 6px; }
    .req { color: #FF3B30; }
    .field input {
      width: 100%; height: 48px; background: #F2F2F7; border: none; border-radius: 10px;
      padding: 0 14px; font-size: 16px; font-family: inherit; color: #1C1C1E;
      outline: none; -webkit-appearance: none; appearance: none;
    }
    .field input:focus { box-shadow: 0 0 0 2px rgba(0,122,255,0.4); }
    .choices { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
    .chip-label input[type=radio] { position: absolute; opacity: 0; width: 0; height: 0; }
    .chip {
      display: inline-block; padding: 8px 16px; border-radius: 100px;
      border: 1.5px solid #E5E5EA; font-size: 14px; font-weight: 500;
      color: #1C1C1E; cursor: pointer; user-select: none; transition: all 0.12s;
    }
    .chip-label input[type=radio]:checked ~ .chip { background: #1C1C1E; border-color: #1C1C1E; color: white; }
    .error-banner { background: #FFF0F0; border-radius: 12px; padding: 12px 16px; color: #CC0000; font-size: 14px; margin-bottom: 16px; }
    .submit-btn {
      width: 100%; height: 52px; background: #1C1C1E; color: white; border: none;
      border-radius: 14px; font-size: 16px; font-weight: 700; font-family: inherit;
      cursor: pointer; margin-top: 8px; transition: opacity 0.15s; display: flex;
      align-items: center; justify-content: center; gap: 8px;
    }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ─── Loading skeleton ──────────────────────────────────── */
    .skeleton { background: #E5E5EA; border-radius: 10px; animation: pulse 1.4s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

    /* ─── Success: fade-in ──────────────────────────────────── */
    @keyframes fadeUp { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }
    .success-page { display: flex; flex-direction: column; gap: 12px; animation: fadeUp 0.35s ease both; }

    /* ─── Success: check card ───────────────────────────────── */
    .check-card { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 10px; }
    .check-icon {
      width: 68px; height: 68px; border-radius: 22px;
      display: flex; align-items: center; justify-content: center; font-size: 36px;
    }
    .check-icon.auto    { background: #E6FAF0; }
    .check-icon.pending { background: #FFF3E0; }
    .check-title { font-size: 22px; font-weight: 700; }

    /* ─── Success: club hero card ───────────────────────────── */
    .club-hero { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 10px; }
    .logo-lg-img   { width: 92px; height: 92px; border-radius: 24px; object-fit: cover; box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
    .logo-lg-emoji { width: 92px; height: 92px; border-radius: 24px; background: #F2F2F7; font-size: 50px; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
    .hero-name { font-size: 24px; font-weight: 700; letter-spacing: -0.3px; }
    .hero-city { font-size: 14px; color: #8E8E93; }
    .hero-desc { font-size: 14px; color: #3C3C43; line-height: 1.55; margin-top: 2px; max-width: 340px; }

    /* ─── Success: stats row ────────────────────────────────── */
    .stats-row { display: flex; gap: 10px; width: 100%; margin-top: 4px; }
    .stat-card {
      flex: 1; background: #F2F2F7; border-radius: 14px;
      padding: 14px 8px; text-align: center;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
    }
    .stat-value { font-size: 28px; font-weight: 700; color: #1C1C1E; line-height: 1; }
    .stat-label { font-size: 11px; color: #8E8E93; font-weight: 500; }
    .stat-skel  { width: 44px; height: 28px; background: #E5E5EA; border-radius: 8px; animation: pulse 1.4s infinite; }

    /* ─── Success: status card ──────────────────────────────── */
    .status-card { border-radius: 16px; padding: 18px 20px; display: flex; flex-direction: column; gap: 6px; }
    .status-card.auto    { background: #E6FAF0; }
    .status-card.pending { background: #FFF3E0; }
    .status-head { display: flex; align-items: center; gap: 8px; }
    .status-emoji { font-size: 20px; }
    .status-title { font-size: 16px; font-weight: 700; }
    .status-title.auto    { color: #1D7D44; }
    .status-title.pending { color: #A65C00; }
    .status-body { font-size: 14px; line-height: 1.55; color: #3C3C43; }
    .status-email { font-weight: 700; color: #1C1C1E; }

    /* ─── Success: app preview ──────────────────────────────── */
    .app-preview { display: flex; flex-direction: column; align-items: center; gap: 0; }
    .preview-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.7px; color: #8E8E93; margin-bottom: 20px; text-align: center;
    }

    /* Phone frame */
    .phone-wrap { display: flex; justify-content: center; margin-bottom: 24px; perspective: 800px; }
    .phone {
      width: 178px;
      background: #1C1C1E;
      border-radius: 32px;
      padding: 14px 9px 10px;
      box-shadow:
        0 2px 0 #444 inset,
        0 -2px 0 #000 inset,
        0 28px 56px rgba(0,0,0,0.32),
        0 8px 16px rgba(0,0,0,0.18);
      transform: rotateY(-4deg) rotateX(2deg);
    }
    .phone-notch {
      width: 56px; height: 7px; background: #333; border-radius: 4px;
      margin: 0 auto 10px;
    }
    .phone-screen {
      background: #F2F2F7; border-radius: 22px; overflow: hidden;
      padding: 12px 10px 10px;
    }

    /* Fake app chrome */
    .ph-topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .ph-greeting-block {}
    .ph-greeting { font-size: 8px; color: #8E8E93; line-height: 1; }
    .ph-club     { font-size: 10px; font-weight: 700; color: #1C1C1E; margin-top: 1px; }
    .ph-avatar   { width: 24px; height: 24px; border-radius: 12px; background: #E5E5EA; }

    .ph-section  { font-size: 7.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #8E8E93; margin-bottom: 6px; }

    .ph-event {
      background: white; border-radius: 10px; padding: 8px 9px; margin-bottom: 5px;
      display: flex; align-items: center; gap: 7px;
    }
    .ph-event-dot { width: 7px; height: 7px; border-radius: 3px; flex-shrink: 0; }
    .ph-event-info { flex: 1; min-width: 0; }
    .ph-event-title { font-size: 8px; font-weight: 700; color: #1C1C1E; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ph-event-date  { font-size: 7px; color: #8E8E93; margin-top: 1px; }
    .ph-badge { font-size: 7px; font-weight: 600; background: #E6FAF0; color: #1D7D44; padding: 2px 5px; border-radius: 5px; white-space: nowrap; }

    .ph-divider { height: 1px; background: #E5E5EA; margin: 8px 0; }

    .ph-channel {
      background: white; border-radius: 10px; padding: 7px 9px;
      display: flex; align-items: center; gap: 7px;
    }
    .ph-ch-icon { font-size: 11px; }
    .ph-ch-text { flex: 1; }
    .ph-ch-name { font-size: 8px; font-weight: 600; color: #1C1C1E; }
    .ph-ch-sub  { font-size: 6.5px; color: #8E8E93; margin-top: 1px; }

    .ph-tabbar {
      display: flex; justify-content: space-around; align-items: center;
      background: #1C1C1E; border-radius: 14px; margin-top: 10px; padding: 7px 4px 5px;
    }
    .ph-tab-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .ph-tab-icon { font-size: 13px; }
    .ph-tab-dot  { width: 4px; height: 4px; border-radius: 2px; background: white; }
    .ph-tab-dot.off { background: #555; }

    /* ─── Store buttons ─────────────────────────────────────── */
    .store-btns { display: flex; flex-direction: column; gap: 10px; width: 100%; }
    .store-btn {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 18px; background: #1C1C1E; border-radius: 16px;
      text-decoration: none; color: white; transition: opacity 0.15s;
    }
    .store-btn:active { opacity: 0.75; }
    .store-icon { font-size: 26px; flex-shrink: 0; line-height: 1; }
    .store-label { flex: 1; }
    .store-sub  { font-size: 11px; color: rgba(255,255,255,0.5); line-height: 1; margin-bottom: 3px; }
    .store-name { font-size: 16px; font-weight: 700; line-height: 1; }
    .store-soon {
      font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.6);
      background: rgba(255,255,255,0.12); border-radius: 8px; padding: 3px 8px;
      white-space: nowrap;
    }

    /* ─── Footer tagline ────────────────────────────────────── */
    .tagline { text-align: center; padding: 4px 8px; }
    .tagline-main { font-size: 15px; font-weight: 700; color: #1C1C1E; margin-bottom: 4px; }
    .tagline-sub  { font-size: 13px; color: #8E8E93; }
    .tagline-pills { display: flex; justify-content: center; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .tagline-pill {
      font-size: 12px; font-weight: 500; color: #636366;
      background: #F2F2F7; border-radius: 20px; padding: 5px 12px;
    }

    /* ─── Spinner ───────────────────────────────────────────── */
    .spinner { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="page" id="page">
  <!-- Skeleton while loading -->
  <div class="card club-head" id="club-skeleton">
    <div class="skeleton" style="width:72px;height:72px;border-radius:18px;"></div>
    <div class="skeleton" style="width:160px;height:22px;border-radius:6px;margin-top:4px;"></div>
    <div class="skeleton" style="width:100px;height:16px;border-radius:6px;"></div>
  </div>
  <div class="card" id="form-skeleton">
    <div class="skeleton" style="width:140px;height:12px;border-radius:4px;margin-bottom:20px;"></div>
    <div class="skeleton" style="width:100%;height:48px;border-radius:10px;margin-bottom:12px;"></div>
    <div class="skeleton" style="width:100%;height:48px;border-radius:10px;margin-bottom:12px;"></div>
    <div class="skeleton" style="width:100%;height:48px;border-radius:10px;margin-bottom:20px;"></div>
    <div class="skeleton" style="width:100%;height:52px;border-radius:14px;"></div>
  </div>
</div>

<script>
// ─── Config ─────────────────────────────────────────────────────────────────
const SUPABASE_URL  = 'https://bgqyszbufnpdgcaskddv.supabase.co';
const ANON_KEY      = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJncXlzemJ1Zm5wZGdjYXNrZGR2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1NDA1NDUsImV4cCI6MjA5NzExNjU0NX0.Ret-8-Rk6bowIY7NiKIRU8rTUvz-weRT9h7bX5Q_CXo';
const FUNCTION_URL  = `${SUPABASE_URL}/functions/v1/join-club`;
const REST_HEADERS  = { 'apikey': ANON_KEY, 'Authorization': `Bearer ${ANON_KEY}` };

// App store links — update when app is live
const APPSTORE_URL  = 'https://tribeapp.co';
const PLAYSTORE_URL = 'https://tribeapp.co';

// ─── Helpers ─────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function logoHtml(club, large) {
  const url = club.logo_url;
  const cls = large ? 'logo-lg' : 'logo';
  if (url && (url.startsWith('http://') || url.startsWith('https://'))) {
    return `<img src="${esc(url)}" class="${cls}-img" alt="${esc(club.name)}">`;
  }
  return `<div class="${cls}-emoji">${esc(url ?? '🏃')}</div>`;
}

function renderFieldInput(f) {
  const name  = `field_${f.id}`;
  const label = `${esc(f.label)}${f.is_required ? ' <span class="req">*</span>' : ''}`;
  const req   = f.is_required ? ' required' : '';
  const type  = f.field_type === 'phone' ? 'tel' : 'text';
  const ph    = f.field_type === 'phone' ? '06 12 34 56 78'
              : f.field_type === 'birthdate' ? 'JJ/MM/AAAA'
              : f.field_type === 'city' ? 'Paris, Lyon…' : '';
  return `<div class="field">
    <label for="${esc(name)}">${label}</label>
    <input type="${type}" id="${esc(name)}" name="${esc(name)}" placeholder="${esc(ph)}"${req}>
  </div>`;
}

// ─── Stats fetch ─────────────────────────────────────────────────────────────
async function fetchClubStats(clubId) {
  const now = new Date().toISOString();
  try {
    const eRes = await fetch(
      `${SUPABASE_URL}/rest/v1/events?club_id=eq.${clubId}&start_at=gt.${encodeURIComponent(now)}&select=id`,
      { headers: { ...REST_HEADERS, 'Prefer': 'count=exact' } }
    );
    function parseCount(res) {
      const range = res.headers.get('Content-Range') ?? '';
      const n = parseInt((range.split('/')[1] ?? '').trim(), 10);
      return isNaN(n) ? null : n;
    }
    return [null, parseCount(eRes)];
  } catch {
    return [null, null];
  }
}

// ─── Main ─────────────────────────────────────────────────────────────────────
async function init() {
  const slug = new URLSearchParams(location.search).get('slug');
  if (!slug) { showError('Lien invalide — aucun slug de club spécifié.'); return; }

  const [clubRes] = await Promise.all([
    fetch(`${SUPABASE_URL}/rest/v1/clubs?slug=eq.${encodeURIComponent(slug)}&select=id,name,slug,logo_url,city,description,admission_mode,primary_color&limit=1`, { headers: REST_HEADERS }),
  ]);

  const clubs = await clubRes.json();
  if (!clubs.length) { showError(`Aucun club trouvé avec le slug « ${esc(slug)} ».`); return; }
  const club = clubs[0];

  const fieldsData = await fetch(
    `${SUPABASE_URL}/rest/v1/admission_form_fields?club_id=eq.${club.id}&order=position&select=*`,
    { headers: REST_HEADERS }
  );
  const fields = (await fieldsData.json()).filter(f => f.field_type !== 'photo');

  renderPage(club, fields);
}

function renderPage(club, fields) {
  const page = document.getElementById('page');

  const modeLabel = club.admission_mode === 'auto'
    ? '✅ Admission automatique'
    : '⏳ Admission sur validation';

  const dynamicFields = fields.map(renderFieldInput).join('');

  page.innerHTML = `
    <div class="card club-head">
      ${logoHtml(club, false)}
      <div class="club-name">${esc(club.name)}</div>
      ${club.city ? `<div class="club-meta">📍 ${esc(club.city)}</div>` : ''}
      ${club.description ? `<div class="club-desc">${esc(club.description)}</div>` : ''}
      <div class="mode-badge">${modeLabel}</div>
    </div>

    <div id="error-banner" class="error-banner" style="display:none;"></div>

    <form id="admission-form" class="card" novalidate>
      <div class="form-title">Formulaire d'admission</div>

      <div class="field">
        <label for="first_name">Prénom <span class="req">*</span></label>
        <input type="text" id="first_name" name="first_name" required autocomplete="given-name" autocapitalize="words">
      </div>
      <div class="field">
        <label for="last_name">Nom</label>
        <input type="text" id="last_name" name="last_name" autocomplete="family-name" autocapitalize="words">
      </div>
      <div class="field">
        <label for="email">Email <span class="req">*</span></label>
        <input type="email" id="email" name="email" required autocomplete="email" inputmode="email">
      </div>

      ${dynamicFields}

      <button type="submit" class="submit-btn" id="submit-btn">
        ${club.admission_mode === 'auto' ? 'Rejoindre le club' : 'Envoyer ma demande'}
      </button>
    </form>
  `;

  document.getElementById('admission-form').addEventListener('submit', (e) => handleSubmit(e, club, fields));
}

async function handleSubmit(e, club, fields) {
  e.preventDefault();
  const form   = e.target;
  const btn    = document.getElementById('submit-btn');
  const banner = document.getElementById('error-banner');

  const get = (name) => (form.elements[name]?.value ?? '').trim();
  if (!get('first_name') || !get('email')) {
    showBanner(banner, 'Le prénom et l\'email sont obligatoires.');
    return;
  }
  for (const f of fields) {
    if (f.is_required && !get(`field_${f.id}`)) {
      showBanner(banner, `Le champ « ${f.label} » est obligatoire.`);
      return;
    }
  }

  banner.style.display = 'none';
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div>';

  const email   = get('email');
  const payload = { first_name: get('first_name'), last_name: get('last_name'), email };
  for (const f of fields) payload[`field_${f.id}`] = get(`field_${f.id}`);

  try {
    const res  = await fetch(`${FUNCTION_URL}?slug=${encodeURIComponent(club.slug)}&api=1`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await res.json();

    if (!res.ok || data.error) {
      showBanner(banner, data.error ?? `Erreur ${res.status}`);
      btn.disabled = false;
      btn.textContent = club.admission_mode === 'auto' ? 'Rejoindre le club' : 'Envoyer ma demande';
      return;
    }

    showSuccess(club, data.status === 'active', email);
  } catch {
    showBanner(banner, 'Erreur réseau. Vérifie ta connexion et réessaie.');
    btn.disabled = false;
    btn.textContent = club.admission_mode === 'auto' ? 'Rejoindre le club' : 'Envoyer ma demande';
  }
}

function showBanner(el, msg) {
  el.textContent = '⚠️ ' + msg;
  el.style.display = 'block';
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ─── Success page ─────────────────────────────────────────────────────────────
function showSuccess(club, isAuto, email) {
  const page    = document.getElementById('page');
  const accent  = club.primary_color || '#007AFF';
  const accentL = accent + '22';

  const checkTitle = isAuto
    ? `Bienvenue dans ${esc(club.name)} !`
    : 'Demande envoyée !';

  const statusTitle = isAuto ? 'Tu as déjà accès !' : 'Demande en cours d\'examen';
  const statusBody  = isAuto
    ? `Télécharge l'app Tribe et connecte-toi avec <span class="status-email">${esc(email)}</span> pour accéder à ton espace membre.`
    : `Ta demande est en cours d\'examen. Tu recevras un email dès que tu seras accepté(e). En attendant, télécharge l\'app Tribe !`;

  page.innerHTML = `
    <div class="success-page">

      <!-- Check -->
      <div class="card check-card">
        <div class="check-icon ${isAuto ? 'auto' : 'pending'}">${isAuto ? '🎉' : '✅'}</div>
        <div class="check-title">${checkTitle}</div>
      </div>

      <!-- Club hero -->
      <div class="card club-hero">
        ${logoHtml(club, true)}
        <div class="hero-name">${esc(club.name)}</div>
        ${club.city ? `<div class="hero-city">📍 ${esc(club.city)}</div>` : ''}
        ${club.description ? `<div class="hero-desc">${esc(club.description)}</div>` : ''}
        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-value" id="stat-events"><div class="stat-skel"></div></div>
            <div class="stat-label">events à venir</div>
          </div>
        </div>
      </div>

      <!-- Status message -->
      <div class="status-card ${isAuto ? 'auto' : 'pending'}">
        <div class="status-head">
          <div class="status-emoji">${isAuto ? '📱' : '⏳'}</div>
          <div class="status-title ${isAuto ? 'auto' : 'pending'}">${statusTitle}</div>
        </div>
        <div class="status-body">${statusBody}</div>
      </div>

      <!-- App preview -->
      <div class="card app-preview">
        <div class="preview-label">Voici à quoi ressemble Tribe</div>

        <div class="phone-wrap">
          <div class="phone">
            <div class="phone-notch"></div>
            <div class="phone-screen">
              <!-- Top bar -->
              <div class="ph-topbar">
                <div class="ph-greeting-block">
                  <div class="ph-greeting">Bonjour 👋</div>
                  <div class="ph-club">${esc(club.name)}</div>
                </div>
                <div class="ph-avatar"></div>
              </div>

              <!-- Events section -->
              <div class="ph-section">Prochains événements</div>
              <div class="ph-event">
                <div class="ph-event-dot" style="background:${esc(accent)};"></div>
                <div class="ph-event-info">
                  <div class="ph-event-title">Sortie running</div>
                  <div class="ph-event-date">Samedi · 8h00 · Bois de V.</div>
                </div>
                <div class="ph-badge">Inscrit</div>
              </div>
              <div class="ph-event">
                <div class="ph-event-dot" style="background:${esc(accent)};opacity:0.5;"></div>
                <div class="ph-event-info">
                  <div class="ph-event-title">Séance trail</div>
                  <div class="ph-event-date">Mercredi · 19h30</div>
                </div>
              </div>

              <div class="ph-divider"></div>

              <!-- Channel -->
              <div class="ph-section">Canaux</div>
              <div class="ph-channel">
                <div class="ph-ch-icon">💬</div>
                <div class="ph-ch-text">
                  <div class="ph-ch-name"># général</div>
                  <div class="ph-ch-sub">Aucun message récent</div>
                </div>
              </div>
            </div>

            <!-- Tab bar -->
            <div class="ph-tabbar">
              <div class="ph-tab-item">
                <div class="ph-tab-icon">🏠</div>
                <div class="ph-tab-dot"></div>
              </div>
              <div class="ph-tab-item">
                <div class="ph-tab-icon">📅</div>
                <div class="ph-tab-dot off"></div>
              </div>
              <div class="ph-tab-item">
                <div class="ph-tab-icon">💬</div>
                <div class="ph-tab-dot off"></div>
              </div>
              <div class="ph-tab-item">
                <div class="ph-tab-icon">👤</div>
                <div class="ph-tab-dot off"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- Store buttons -->
        <div class="store-btns">
          <a href="${APPSTORE_URL}" class="store-btn" target="_blank" rel="noopener">
            <div class="store-icon">🍎</div>
            <div class="store-label">
              <div class="store-sub">Télécharger sur l'</div>
              <div class="store-name">App Store</div>
            </div>
            <div class="store-soon">Bientôt</div>
          </a>
          <a href="${PLAYSTORE_URL}" class="store-btn" target="_blank" rel="noopener">
            <div class="store-icon">▶</div>
            <div class="store-label">
              <div class="store-sub">Disponible sur</div>
              <div class="store-name">Google Play</div>
            </div>
            <div class="store-soon">Bientôt</div>
          </a>
        </div>
      </div>

      <!-- Footer tagline -->
      <div class="tagline">
        <div class="tagline-main">Tribe — La plateforme des clubs sportifs urbains</div>
        <div class="tagline-sub">Rejoins ${esc(club.name)} et bien plus encore.</div>
        <div class="tagline-pills">
          <span class="tagline-pill">📅 Events</span>
          <span class="tagline-pill">💬 Canaux</span>
          <span class="tagline-pill">🏅 Badges</span>
          <span class="tagline-pill">👥 Communauté</span>
        </div>
      </div>

    </div>
  `;

  // Load stats asynchronously
  fetchClubStats(club.id).then(([, eventCount]) => {
    const eEl = document.getElementById('stat-events');
    if (eEl) eEl.textContent = eventCount !== null ? eventCount.toString() : '—';
  });
}

function showError(msg) {
  document.getElementById('page').innerHTML = `
    <div class="card" style="display:flex;flex-direction:column;align-items:center;text-align:center;gap:12px;padding:40px 24px;">
      <div style="font-size:48px;">🔍</div>
      <div style="font-size:20px;font-weight:700;">Oups</div>
      <div style="font-size:15px;color:#636366;line-height:1.55;">${msg}</div>
    </div>
  `;
}

init().catch(() => showError('Erreur de chargement. Réessaie dans quelques instants.'));
</script>
</body>
</html>
